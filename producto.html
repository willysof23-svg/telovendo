<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Producto — TELOVENDO</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Public+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    .ficha { display:grid; gap:32px; }
    @media (min-width:900px){ .ficha { grid-template-columns: 1fr 1fr; } }
    .galeria__principal { aspect-ratio:1/1; background:#F1ECE0; border-radius:var(--radio-grande); overflow:hidden; }
    .galeria__principal img { width:100%; height:100%; object-fit:cover; }
    .galeria__miniaturas { display:flex; gap:8px; margin-top:10px; overflow-x:auto; }
    .galeria__miniaturas img { width:64px; height:64px; object-fit:cover; border-radius:6px; cursor:pointer; border:2px solid transparent; }
    .galeria__miniaturas img.activa { border-color: var(--color-primario); }
    .metodos-pago { display:flex; flex-direction:column; gap:8px; margin:16px 0; }
    .metodo-pago { display:flex; align-items:center; gap:10px; border:1px solid var(--color-linea); border-radius:8px; padding:12px; cursor:pointer; }
    .metodo-pago input { width:18px; height:18px; }
    #resultado-cripto { font-family: var(--fuente-datos); color: var(--color-primario); margin-top:8px; min-height:1.2em; }
    .sticky-movil { position:sticky; bottom:0; background:#fff; padding:12px 0; border-top:1px solid var(--color-linea); }
    @media (min-width:900px){ .sticky-movil { position:static; border:none; padding:0; } }

    /* NUEVO (v10): oferta y preguntas/inquietudes */
    .oculto { display:none !important; }
    .bloque-oferta { margin-top:14px; }
    .bloque-consulta { margin-top:28px; padding-top:20px; border-top:1px solid var(--color-linea); }
    .bloque-consulta h3 { font-size:1.1rem; margin-bottom:6px; }
    .bloque-consulta__ayuda { color:#6b7280; font-size:0.85rem; margin-bottom:14px; }
    .mini-form { max-width:420px; margin-top:12px; }
    .mini-form .campo { margin-bottom:12px; }
    .mini-form label { display:block; font-weight:600; margin-bottom:4px; font-size:0.88rem; }
    .mini-form input, .mini-form textarea {
      width:100%; min-height:44px; padding:8px 12px; border-radius:8px; border:1px solid var(--color-linea);
      font-family: var(--fuente-texto); box-sizing:border-box;
    }
    .mini-form textarea { min-height:80px; resize:vertical; }
    .mini-form small { display:block; color:#6b7280; font-size:0.78rem; margin-top:-6px; margin-bottom:10px; }
    .mensaje-form-ok { color:var(--color-primario); font-weight:600; font-size:0.88rem; margin-top:10px; }
    .mensaje-form-error { color:var(--color-advertencia); font-weight:600; font-size:0.88rem; margin-top:10px; }
  </style>
</head>
<body>
  <header class="encabezado">
    <div class="contenedor encabezado__barra">
      <div class="encabezado__logo">
        <img data-marca="logo" src="assets/logo-default.svg" alt="Logo">
        <span data-marca="nombre_sitio">TELOVENDO</span>
      </div>
      <nav class="encabezado__nav"><a href="index.html">Inicio</a><a href="catalogo.html">Catálogo</a></nav>
      <button class="encabezado__menu-btn" aria-label="Abrir menú">☰</button>
    </div>
  </header>

  <main class="seccion">
    <div class="contenedor ficha" id="ficha-producto">
      <p style="color:#6b7280;">Cargando producto…</p>
    </div>
  </main>

  <footer class="pie"><div class="contenedor"><p><strong data-marca="nombre_sitio">TELOVENDO</strong></p></div></footer>

  <script src="brand.config.js"></script>
  <script src="app.js"></script>
  <script>
    const idProducto = new URLSearchParams(window.location.search).get("id");

    async function cargarProducto() {
      const cont = document.getElementById("ficha-producto");
      try {
        const p = await apiTelovendo.obtenerProducto(idProducto);
        if (p.error) { cont.innerHTML = `<p>${p.error}</p>`; return; }

        const galeria = (p.galeria && p.galeria.length) ? p.galeria : [{ url: "assets/producto-placeholder.svg" }];
        const metodos = (p.metodosPago || "").split(",").filter(Boolean);

        cont.innerHTML = `
          <div>
            <div class="galeria__principal"><img id="img-principal" src="${galeria[0].url}" alt="${p.nombre}"></div>
            <div class="galeria__miniaturas">
              ${galeria.map((g, i) => `<img src="${g.url}" class="${i === 0 ? 'activa' : ''}" onclick="cambiarImagen_(this, '${g.url}')">`).join('')}
            </div>
          </div>
          <div>
            <h1 style="font-size:1.7rem;">${p.nombre}</h1>
            <p class="precio" style="font-size:1.6rem; font-weight:700;">${formatearPrecio(p.precio)}</p>
            ${p.agotado ? `<p><span class="timbre" style="border-color:var(--color-advertencia); color:var(--color-advertencia); border-style:solid; width:auto; padding:4px 14px; border-radius:100px; font-family:var(--fuente-datos); font-size:0.78rem;">Agotado</span></p>` : ''}
            <p style="color:#4b5563;">${p.descripcion || ''}</p>

            <h3 style="margin-top:20px;">Método de pago</h3>
            <div class="metodos-pago" id="lista-metodos">
              ${metodos.map(m => `
                <label class="metodo-pago">
                  <input type="radio" name="metodo" value="${m}" ${p.agotado ? 'disabled' : ''}>
                  <span>${etiquetaMetodo_(m)}</span>
                </label>`).join('')}
            </div>
            <div id="resultado-cripto"></div>

            <div class="sticky-movil">
              <button class="boton boton--primario" style="width:100%;" id="btn-comprar" ${p.agotado ? 'disabled' : ''}>
                ${p.agotado ? 'Agotado' : 'Comprar ahora'}
              </button>
            </div>

            <!-- NUEVO (v10): hacer una oferta. Convive con "Comprar ahora": no lo reemplaza, es una alternativa para quien quiere negociar el precio. -->
            <div class="bloque-oferta">
              <button type="button" class="boton boton--fantasma" id="btn-toggle-oferta" style="width:100%;">💬 Hacer una oferta por este producto</button>
              <form id="form-oferta" class="mini-form oculto">
                <div class="campo"><label for="oferta-nombre">Tu nombre</label><input type="text" id="oferta-nombre" placeholder="Opcional"></div>
                <div class="campo"><label for="oferta-valor">Valor que ofreces</label><input type="number" id="oferta-valor" min="1" required></div>
                <div class="campo">
                  <label for="oferta-contacto">Contacto</label>
                  <input type="text" id="oferta-contacto" placeholder="WhatsApp o correo" required>
                  <small>Obligatorio: así te podemos responder la oferta.</small>
                </div>
                <div class="campo"><label for="oferta-mensaje">Mensaje (opcional)</label><textarea id="oferta-mensaje" rows="2"></textarea></div>
                <button type="submit" class="boton boton--primario" style="width:100%;">Enviar oferta</button>
                <p id="oferta-mensaje-resultado"></p>
              </form>
            </div>

            <!-- NUEVO (v10): preguntas e inquietudes. Contacto siempre obligatorio (regla de negocio explícita). -->
            <div class="bloque-consulta">
              <h3>Preguntas e inquietudes</h3>
              <p class="bloque-consulta__ayuda">¿Tienes dudas sobre este producto? Escríbenos y te respondemos directamente por tu contacto.</p>
              <form id="form-consulta" class="mini-form">
                <div class="campo"><label for="consulta-nombre">Tu nombre</label><input type="text" id="consulta-nombre" placeholder="Opcional"></div>
                <div class="campo"><label for="consulta-pregunta">Tu pregunta</label><textarea id="consulta-pregunta" rows="3" required></textarea></div>
                <div class="campo">
                  <label for="consulta-contacto">Contacto</label>
                  <input type="text" id="consulta-contacto" placeholder="WhatsApp o correo" required>
                  <small>Obligatorio: sin un contacto no podemos responderte.</small>
                </div>
                <button type="submit" class="boton boton--primario" style="width:100%;">Enviar pregunta</button>
                <p id="consulta-mensaje-resultado"></p>
              </form>
            </div>
          </div>
        `;

        // NUEVO (v4): si está agotado, el botón queda deshabilitado visualmente
        // y no se activa el click (defensa en cliente; el servidor también
        // rechaza la compra en crearPedido_ como defensa real).
        if (p.agotado) {
          const btn = document.getElementById("btn-comprar");
          btn.style.opacity = "0.6";
          btn.style.cursor = "not-allowed";
        }

        document.querySelectorAll('input[name="metodo"]').forEach(radio => {
          radio.addEventListener("change", () => actualizarCotizacion_(radio.value, p.precio));
        });

        document.getElementById("btn-comprar").addEventListener("click", () => {
          if (p.agotado) return;
          window.location.href = `carrito.html?id=${idProducto}`;
        });

        // NUEVO (v10): oferta y preguntas — se conectan aquí porque el HTML
        // recién se insertó arriba (innerHTML) y los elementos ya existen en el DOM.
        inicializarFormularioOferta_(p);
        inicializarFormularioConsulta_(p);
      } catch (err) {
        cont.innerHTML = "<p style='color:#6b7280;'>No se pudo cargar el producto (¿backend desplegado?).</p>";
      }
    }

    /**
     * NUEVO (v10): conecta el botón "Hacer una oferta" (muestra/oculta el
     * mini-formulario) y su envío al backend (accion=crearOferta). Nunca
     * modifica el precio ni el stock del producto — solo queda registrada
     * para que el admin la revise desde el panel.
     * @param {Object} producto - producto ya cargado (para el idProducto)
     */
    function inicializarFormularioOferta_(producto) {
      const btnToggle = document.getElementById("btn-toggle-oferta");
      const form = document.getElementById("form-oferta");
      btnToggle.addEventListener("click", () => form.classList.toggle("oculto"));

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const resultado = document.getElementById("oferta-mensaje-resultado");
        const valor = Number(document.getElementById("oferta-valor").value);
        const contacto = document.getElementById("oferta-contacto").value.trim();

        if (!valor || valor <= 0) {
          resultado.className = "mensaje-form-error";
          resultado.textContent = "Escribe un valor válido para tu oferta.";
          return;
        }
        if (!contacto) {
          resultado.className = "mensaje-form-error";
          resultado.textContent = "El contacto es obligatorio para poder responderte.";
          return;
        }

        resultado.className = "";
        resultado.textContent = "Enviando…";
        try {
          const res = await apiTelovendo.crearOferta({
            idProducto,
            nombreInteresado: document.getElementById("oferta-nombre").value.trim(),
            valorOfertado: valor,
            contacto,
            mensaje: document.getElementById("oferta-mensaje").value.trim()
          });
          if (res.ok) {
            resultado.className = "mensaje-form-ok";
            resultado.textContent = "¡Oferta enviada! Te contactaremos pronto por el contacto que dejaste.";
            form.reset();
          } else {
            resultado.className = "mensaje-form-error";
            resultado.textContent = res.error || "No se pudo enviar la oferta.";
          }
        } catch (err) {
          resultado.className = "mensaje-form-error";
          resultado.textContent = "No se pudo conectar con el backend. Intenta de nuevo.";
        }
      });
    }

    /**
     * NUEVO (v10): conecta el formulario de "Preguntas e inquietudes". El
     * contacto es SIEMPRE obligatorio (regla de negocio explícita) — se
     * valida aquí Y en el servidor (nunca confiar solo en el cliente).
     * @param {Object} producto - producto ya cargado (para el idProducto)
     */
    function inicializarFormularioConsulta_(producto) {
      const form = document.getElementById("form-consulta");
      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const resultado = document.getElementById("consulta-mensaje-resultado");
        const pregunta = document.getElementById("consulta-pregunta").value.trim();
        const contacto = document.getElementById("consulta-contacto").value.trim();

        if (!pregunta) {
          resultado.className = "mensaje-form-error";
          resultado.textContent = "Escribe tu pregunta.";
          return;
        }
        if (!contacto) {
          resultado.className = "mensaje-form-error";
          resultado.textContent = "El contacto es obligatorio: sin él no podemos responderte.";
          return;
        }

        resultado.className = "";
        resultado.textContent = "Enviando…";
        try {
          const res = await apiTelovendo.crearConsulta({
            idProducto,
            nombreInteresado: document.getElementById("consulta-nombre").value.trim(),
            pregunta,
            contacto
          });
          if (res.ok) {
            resultado.className = "mensaje-form-ok";
            resultado.textContent = "¡Pregunta enviada! Te responderemos por el contacto que dejaste.";
            form.reset();
          } else {
            resultado.className = "mensaje-form-error";
            resultado.textContent = res.error || "No se pudo enviar la pregunta.";
          }
        } catch (err) {
          resultado.className = "mensaje-form-error";
          resultado.textContent = "No se pudo conectar con el backend. Intenta de nuevo.";
        }
      });
    }

    function cambiarImagen_(el, url) {
      document.getElementById("img-principal").src = url;
      document.querySelectorAll(".galeria__miniaturas img").forEach(i => i.classList.remove("activa"));
      el.classList.add("activa");
    }

    function etiquetaMetodo_(m) {
      const etiquetas = { tarjeta: "💳 Tarjeta de crédito/débito", transferencia: "🏦 Transferencia bancaria",
        contraentrega: "📦 Pago contra entrega", btc: "₿ Bitcoin (BTC)", usdt: "₮ USDT", usdc: "Ⓤ USDC", billetera: "📱 Billetera digital" };
      return etiquetas[m] || m;
    }

    async function actualizarCotizacion_(metodo, precioBase) {
      const div = document.getElementById("resultado-cripto");
      if (!["btc", "usdt", "usdc"].includes(metodo)) { div.textContent = ""; return; }
      div.textContent = "Calculando cotización…";
      const res = await apiTelovendo.cotizarCripto(precioBase, metodo.toUpperCase());
      if (res.error) { div.textContent = res.error; return; }
      div.textContent = `≈ ${res.montoCripto} ${res.moneda} · cotización válida por 15 minutos`;
    }

    cargarProducto();
  </script>
</body>
</html>
