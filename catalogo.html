<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catálogo — TELOVENDO</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Public+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    .filtros { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:24px; }
    .filtros select, .filtros input {
      font-family: var(--fuente-texto); min-height:44px; padding:0 12px;
      border-radius:6px; border:1px solid var(--color-linea); background:#fff;
    }
  </style>
</head>
<body>
  <header class="encabezado">
    <div class="contenedor encabezado__barra">
      <div class="encabezado__logo">
        <img data-marca="logo" src="assets/logo-default.svg" alt="Logo">
        <span data-marca="nombre_sitio">TELOVENDO</span>
      </div>
      <nav class="encabezado__nav">
        <a href="index.html">Inicio</a>
        <a href="catalogo.html"><strong>Catálogo</strong></a>
        <a href="#ayuda">Ayuda</a>
      </nav>
      <button class="encabezado__menu-btn" aria-label="Abrir menú">☰</button>
    </div>
  </header>

  <main class="seccion">
    <div class="contenedor">
      <h1 style="font-size:1.8rem;">Catálogo</h1>

      <div class="filtros">
        <select id="filtro-categoria">
          <option value="">Todas las categorías</option>
        </select>
        <select id="filtro-orden">
          <option value="relevancia">Relevancia</option>
          <option value="precioAsc">Precio: menor a mayor</option>
          <option value="precioDesc">Precio: mayor a menor</option>
        </select>
        <input type="number" id="filtro-precio-min" placeholder="Precio mín.">
        <input type="number" id="filtro-precio-max" placeholder="Precio máx.">
        <button class="boton boton--primario" id="btn-aplicar-filtros">Filtrar</button>
      </div>

      <div class="grilla-productos" id="grilla-catalogo">
        <p style="color:#6b7280;">Cargando productos…</p>
      </div>
    </div>
  </main>

  <footer class="pie">
    <div class="contenedor">
      <p><strong data-marca="nombre_sitio">TELOVENDO</strong></p>
    </div>
  </footer>

  <script src="brand.config.js"></script>
  <script src="app.js"></script>
  <script>
    async function cargarCatalogo() {
      const contenedor = document.getElementById("grilla-catalogo");
      const filtros = {
        categoria: document.getElementById("filtro-categoria").value,
        orden: document.getElementById("filtro-orden").value,
        precioMin: document.getElementById("filtro-precio-min").value,
        precioMax: document.getElementById("filtro-precio-max").value
      };
      try {
        const productos = await apiTelovendo.listarProductos(filtros);

        // NUEVO: llenar el selector de categorías con las categorías REALES
        // de los productos (nunca texto fijo). Solo se repuebla cuando no
        // hay un filtro de categoría activo, para que el listado de
        // opciones no se reduzca una vez el comprador ya eligió una
        // categoría específica.
        if (!filtros.categoria) poblarFiltroCategoriasCatalogo_(productos);

        if (!Array.isArray(productos) || productos.length === 0) {
          contenedor.innerHTML = "<p style='color:#6b7280;'>No se encontraron productos con esos filtros.</p>";
          return;
        }
        contenedor.innerHTML = productos.map(p => `
          <a class="boleta" href="producto.html?id=${p.id}" style="text-decoration:none; color:inherit;">
            <div class="boleta__imagen">
              ${p.agotado ? '<span class="boleta__insignia boleta__insignia--oferta">Agotado</span>' : ''}
              <img src="${p.imagenPortada || 'assets/producto-placeholder.svg'}" alt="${p.nombre}">
            </div>
            <div class="boleta__perforacion"></div>
            <div class="boleta__cuerpo">
              <p class="boleta__titulo">${p.nombre}</p>
              <div class="boleta__fila-precio"><span class="precio boleta__precio">${formatearPrecio(p.precio)}</span></div>
              <div class="boleta__metodos">${(p.metodosPago || '').split(',').join(' · ')}</div>
            </div>
          </a>`).join("");
      } catch (err) {
        contenedor.innerHTML = "<p style='color:#6b7280;'>No se pudo conectar con el backend todavía.</p>";
      }
    }

    /**
     * Llena el <select> de categorías del catálogo público con las
     * categorías reales que existen entre los productos activos — nunca
     * texto fijo en el HTML. Conserva la selección actual si ya había una.
     * @param {Array<Object>} productos - productos ya cargados (con .categoria)
     * Invocada por: cargarCatalogo()
     */
    function poblarFiltroCategoriasCatalogo_(productos) {
      const select = document.getElementById("filtro-categoria");
      const actual = select.value;
      const categorias = [...new Set(productos.map(p => p.categoria).filter(Boolean))].sort();
      select.innerHTML = `<option value="">Todas las categorías</option>` +
        categorias.map(c => `<option value="${c}" ${c === actual ? 'selected' : ''}>${c}</option>`).join("");
    }

    document.getElementById("btn-aplicar-filtros").addEventListener("click", cargarCatalogo);
    cargarCatalogo();
  </script>
</body>
</html>
